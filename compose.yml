name: diplom_work

services:
  postgres:
    image: postgres:18
    container_name: diplom_work-postgres
    environment:
      POSTGRES_DB: diplom_work
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - diplom_work_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  
volumes:
  diplom_work_postgres_data:
